name: Render - Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
    - name: Ping Render health endpoint
      run: |
        curl --fail --silent --show-error \
          --max-time 30 \
          "$RENDER_HEALTHCHECK_URL"
      env:
        RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
    - name: Summarize keepalive ping
      run: |
        echo "### Render keepalive" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- ping_url_secret: \`RENDER_HEALTHCHECK_URL\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- result: \`success\`" >> "$GITHUB_STEP_SUMMARY"
